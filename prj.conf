# Enable GPIO
CONFIG_GPIO=y

# Enable console/logging
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

# Enable logging subsystem
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Enable shell for interactive commands
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_PROMPT_UART="my_app_rt1180:~$ "

# Shell extras
CONFIG_KERNEL_SHELL=y
CONFIG_DEVICE_SHELL=y

# Enable reboot support
CONFIG_REBOOT=y

# ============ Networking ============
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y

# Static IP configuration (disable DHCP)
CONFIG_NET_DHCPV4=n
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.168.0.32"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"
CONFIG_NET_CONFIG_MY_IPV4_GW="192.168.0.1"

# Network buffers
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32
CONFIG_NET_MAX_CONTEXTS=10

# Ethernet (RT1180 NETC driver is auto-selected from devicetree)
CONFIG_NET_L2_ETHERNET=y

# Network shell commands
CONFIG_NET_SHELL=y

# Increase main stack for networking
CONFIG_MAIN_STACK_SIZE=4096

# Dual Ethernet interface support
CONFIG_NET_IF_MAX_IPV4_COUNT=8
CONFIG_NET_CONFIG_INIT_TIMEOUT=30

# DSA - initializes NETC switch hardware forwarding and creates per-port interfaces
CONFIG_NET_DSA=y

# Entropy
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

# ============ TLS/HTTPS ============
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=65536
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=8192

# TLS key exchange and cipher suites
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_ECDSA_ENABLED=y
CONFIG_MBEDTLS_ECDSA_C=y
CONFIG_MBEDTLS_CIPHER_AES_ENABLED=y
CONFIG_MBEDTLS_CIPHER_GCM_ENABLED=y
CONFIG_MBEDTLS_ECP_C=y
CONFIG_MBEDTLS_ECDH_C=y
CONFIG_MBEDTLS_ECP_DP_SECP256R1_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_SECP384R1_ENABLED=y

# TLS sockets
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=6
CONFIG_TLS_CREDENTIALS=y
CONFIG_TLS_MAX_CREDENTIALS_NUMBER=4

# Increase system heap for TLS
CONFIG_HEAP_MEM_POOL_SIZE=49152

# ============ Debug ============
CONFIG_DEBUG_OPTIMIZATIONS=y
CONFIG_DEBUG_THREAD_INFO=y

# ============ Raw Ethernet / AF_PACKET sockets ============
# Required for GOOSE, RSTP, HSR, PRP (Layer 2 raw frames)
CONFIG_NET_SOCKETS_PACKET=y
CONFIG_NET_ETHERNET_FORWARD_UNRECOGNISED_ETHERTYPE=y
CONFIG_NET_PROMISCUOUS_MODE=y
